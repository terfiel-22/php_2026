services: 
  app:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: php_2026-app
    restart: always
    working_dir: /var/www
    volumes:
      - ../src:/var/www
  
  nginx:
    image: nginx:1.29.8-alpine 
    container_name: php_2026-nginx
    restart: always
    ports: 
      - "8000:80"
    volumes:
      - ../src:/var/www
      - ./nginx:/etc/nginx/conf.d